<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Essex Botany Forms</title>
<meta name="theme-color" content="#1f3b2c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Botany"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<style>
  :root{--hdr:#1f3b2c;--pri:#2f6b3d;--bg:#f4f7f4;--sec:#cfe3d4;--ink:#16261d;--muted:#6b7d72}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  body{display:flex;flex-direction:column;min-height:100%}
  header{background:var(--hdr);color:#fff;padding:calc(18px + env(safe-area-inset-top)) 18px 18px;text-align:center}
  header h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.4px}
  header p{margin:5px 0 0;font-size:12.5px;color:#cfe3d4}
  header #whoami{margin-top:11px;background:#2f6b3d;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;padding:10px 15px}
  header #whoamiOut{margin-top:7px;font-size:13px;font-weight:600;color:#e7f2ea;min-height:16px}
  main{flex:1;display:flex;flex-direction:column;gap:14px;padding:18px;max-width:560px;width:100%;margin:0 auto}
  a.card{display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--ink);
    background:#fff;border:1px solid #e0e8e2;border-radius:16px;padding:20px 18px;
    box-shadow:0 2px 6px rgba(0,0,0,.05);min-height:88px}
  a.card:active{transform:scale(.99)}
  .ic{flex:none;width:54px;height:54px;border-radius:14px;background:var(--hdr);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800}
  .tx{flex:1;min-width:0}
  .tx .t{font-size:19px;font-weight:800}
  .tx .d{font-size:13px;color:var(--muted);margin-top:2px}
  .chev{flex:none;color:#9aa8a0;font-size:24px;font-weight:800}
  footer{padding:10px 18px calc(16px + env(safe-area-inset-bottom));text-align:center;font-size:11.5px;color:var(--muted)}
  #net{display:inline-block;margin-top:2px}
</style>
</head>
<body>
  <header>
    <h1>Essex Botany Forms</h1>
    <p>Luke Bristow &middot; field recording</p>
    <button id="whoami">📍 Which monad am I in?</button>
    <div id="whoamiOut"></div>
  </header>
  <main>
    <a class="card" href="dafor.html"><div class="ic">D</div>
      <div class="tx"><div class="t">DAFOR Survey</div><div class="d">Site-pack importer &middot; DAFOR + LA scoring</div></div>
      <div class="chev">›</div></a>
    <a class="card" href="nvc.html"><div class="ic">N</div>
      <div class="tx"><div class="t">NVC Survey</div><div class="d">Quadrats &middot; Domin &middot; community</div></div>
      <div class="chev">›</div></a>
    <a class="card" href="monad.html"><div class="ic">M</div>
      <div class="tx"><div class="t">Monad Presence</div><div class="d">Presence/absence checklist &middot; CSV</div></div>
      <div class="chev">›</div></a>
    <a class="card" href="monadmap.html"><div class="ic">🗺</div>
      <div class="tx"><div class="t">Monad Map</div><div class="d">Essex grid · where am I</div></div>
      <div class="chev">›</div></a>
  </main>
  <footer>
    Works offline once opened with signal.
    <span id="net"></span>
  </footer>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
  function netState(){ const n=document.getElementById('net'); n.textContent = navigator.onLine ? '· online' : '· offline (cached)'; }
  window.addEventListener('online',netState); window.addEventListener('offline',netState); netState();
  // quick 'which monad am I in' — GPS -> OSGB -> grid ref (no map needed)
  function latLonToOS(lat,lon){var a=6378137.0,f=1/298.257223563,e2=2*f-f*f,phi=lat*Math.PI/180,lam=lon*Math.PI/180;
    var nu=a/Math.sqrt(1-e2*Math.pow(Math.sin(phi),2));var x=nu*Math.cos(phi)*Math.cos(lam),y=nu*Math.cos(phi)*Math.sin(lam),z=(1-e2)*nu*Math.sin(phi);
    var s=20.4894e-6,rx=-0.1502/3600*Math.PI/180,ry=-0.2470/3600*Math.PI/180,rz=-0.8421/3600*Math.PI/180;
    var x2=-446.448+(1+s)*x-rz*y+ry*z,y2=125.157+rz*x+(1+s)*y-rx*z,z2=-542.060-ry*x+rx*y+(1+s)*z;
    var a2=6377563.396,b2=6356256.909,e22=(a2*a2-b2*b2)/(a2*a2),p=Math.sqrt(x2*x2+y2*y2),phi2=Math.atan2(z2,p*(1-e22)),nu2;
    for(var i=0;i<10;i++){nu2=a2/Math.sqrt(1-e22*Math.pow(Math.sin(phi2),2));phi2=Math.atan2(z2+e22*nu2*Math.sin(phi2),p);}
    var lam2=Math.atan2(y2,x2),F0=0.9996012717,lat0=49*Math.PI/180,lon0=-2*Math.PI/180,E0=400000,N0=-100000,n=(a2-b2)/(a2+b2);
    nu2=a2*F0/Math.sqrt(1-e22*Math.pow(Math.sin(phi2),2));var rho=a2*F0*(1-e22)/Math.pow(1-e22*Math.pow(Math.sin(phi2),2),1.5),eta2=nu2/rho-1;
    var Ma=(1+n+1.25*n*n+1.25*n*n*n)*(phi2-lat0),Mb=(3*n+3*n*n+2.625*n*n*n)*Math.sin(phi2-lat0)*Math.cos(phi2+lat0);
    var Mc=(1.875*n*n+1.875*n*n*n)*Math.sin(2*(phi2-lat0))*Math.cos(2*(phi2+lat0)),Md=35/24*n*n*n*Math.sin(3*(phi2-lat0))*Math.cos(3*(phi2+lat0));
    var M=b2*F0*(Ma-Mb+Mc-Md),cp=Math.cos(phi2),sp=Math.sin(phi2),tp=Math.tan(phi2);
    var I=M+N0,II=nu2/2*sp*cp,III=nu2/24*sp*Math.pow(cp,3)*(5-tp*tp+9*eta2),IIIA=nu2/720*sp*Math.pow(cp,5)*(61-58*tp*tp+Math.pow(tp,4));
    var IV=nu2*cp,V=nu2/6*Math.pow(cp,3)*(nu2/rho-tp*tp),VI=nu2/120*Math.pow(cp,5)*(5-18*tp*tp+Math.pow(tp,4)+14*eta2-58*tp*tp*eta2),dl=lam2-lon0;
    return {e:E0+IV*dl+V*Math.pow(dl,3)+VI*Math.pow(dl,5),n:I+II*dl*dl+III*Math.pow(dl,4)+IIIA*Math.pow(dl,6)};}
  var LET='ABCDEFGHJKLMNOPQRSTUVWXYZ';
  function osGridref(E,N){var e100=Math.floor(E/100000),n100=Math.floor(N/100000);if(e100<0||e100>6||n100<0||n100>12)return null;
    var l1=(19-n100)-(19-n100)%5+Math.floor((e100+10)/5),l2=((19-n100)*5)%25+e100%5;var ee=Math.floor((E%100000)/1000),nn=Math.floor((N%100000)/1000);
    return LET[l1]+LET[l2]+(ee<10?'0':'')+ee+(nn<10?'0':'')+nn;}
  document.getElementById('whoami').onclick=function(){var out=document.getElementById('whoamiOut');
    if(!navigator.geolocation){out.textContent='No GPS on this device';return;}out.textContent='Locating…';
    navigator.geolocation.getCurrentPosition(function(p){var os=latLonToOS(p.coords.latitude,p.coords.longitude),ref=osGridref(os.e,os.n),acc=Math.round(p.coords.accuracy||0);
      out.textContent=ref?('You are in '+ref+'  (±'+acc+' m)'):'Outside the GB grid';},
    function(err){out.textContent='GPS '+(err.code===1?'permission denied':'unavailable');},{enableHighAccuracy:true,timeout:12000,maximumAge:0});};
</script>
</body>
</html>
